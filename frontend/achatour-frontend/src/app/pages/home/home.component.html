[ HOME ! ]
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 p-4">
  <div *ngFor="let product of products" class="bg-white shadow rounded-xl p-4 cursor-pointer hover:scale-105 transition" (click)="viewProduct(product.id)">
    <img [src]="product.images?.[0] || 'assets/placeholder.jpg'" alt="Produit" class="w-full h-48 object-cover rounded-lg" />
    <h2 class="mt-2 text-xl font-semibold">{{ product.name }}</h2>
    <p class="text-gray-600">{{ product.price }} €</p>
  </div>
</div>
